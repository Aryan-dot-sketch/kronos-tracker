<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B88A44"/>
      <stop offset="100%" style="stop-color:#8E6205"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#F7F1E8" stroke="#B88A44" stroke-width="2.5"/>
  <!-- Clock face subtle -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#B88A44" stroke-width="1.5" opacity="0.3"/>
  <!-- Hour markers -->
  <g fill="#B88A44">
    <circle cx="32" cy="12" r="1.5"/>
    <circle cx="52" cy="32" r="1.5"/>
    <circle cx="32" cy="52" r="1.5"/>
    <circle cx="12" cy="32" r="1.5"/>
  </g>
  <!-- Elegant clock hands (pointing to ~10:10) -->
  <path d="M32 18 L32 33" stroke="#B88A44" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M32 33 L42 25" stroke="#B88A44" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#B88A44"/>
</svg>