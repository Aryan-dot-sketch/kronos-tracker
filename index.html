<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kronos Tracker — Premium Goal Command Center</title>
  <meta name="description" content="Kronos Tracker is a premium IST-based goal, streak, checklist and performance dashboard for serious targets like JEE Mains." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <circle cx="32" cy="32" r="27" fill="none" stroke="currentColor" stroke-width="3"/>
            <path d="M32 15v18l12 8" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20 48c4 3 8 4 12 4s8-1 12-4" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <p class="brand-kicker">Mission Control</p>
          <h2>Kronos Tracker</h2>
        </div>
      </div>

      <nav class="nav-list">
        <button class="nav-item active" data-view="dashboard">
          <span class="nav-icon">◈</span><span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="today">
          <span class="nav-icon">✓</span><span>Today</span>
        </button>
        <button class="nav-item" data-view="goal">
          <span class="nav-icon">◎</span><span>Main Goal</span>
        </button>
        <button class="nav-item" data-view="calendar">
          <span class="nav-icon">▦</span><span>Calendar</span>
        </button>
        <button class="nav-item" data-view="analytics">
          <span class="nav-icon">▰</span><span>Analytics</span>
        </button>
        <button class="nav-item" data-view="jee">
          <span class="nav-icon">π</span><span>JEE Tracker</span>
        </button>
        <button class="nav-item" data-view="review">
          <span class="nav-icon">✦</span><span>Review</span>
        </button>
        <button class="nav-item" data-view="settings">
          <span class="nav-icon">⚙</span><span>Settings</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="engine-status">
          <span class="pulse-dot"></span>
          <div>
            <strong>IST Engine</strong>
            <small>Strict midnight reset</small>
          </div>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="viewEyebrow">Premium Daily Execution</p>
          <h1 id="viewTitle">Dashboard</h1>
        </div>
        <div class="top-actions">
          <button class="ghost-button" data-action="open-goal-dialog">Edit Goal</button>
          <button class="primary-button" data-action="open-task-dialog">+ Add Task</button>
          <button class="icon-toggle" data-action="toggle-theme" title="Toggle theme" aria-label="Toggle theme">◐</button>
          <div class="ist-pill" aria-live="polite">
            <span id="topDate">Loading IST date</span>
            <strong id="topTime">--:--:-- IST</strong>
          </div>
        </div>
      </header>

      <section id="appView" class="view-stage" aria-live="polite"></section>
    </main>

    <aside class="insight-panel" id="rightPanel" aria-label="Kronos insights"></aside>
  </div>

  <dialog class="modal" id="taskDialog">
    <form method="dialog" class="modal-card" id="taskForm">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Daily Mission</p>
          <h2>Add Task</h2>
        </div>
        <button class="icon-button" type="button" data-action="close-task-dialog" aria-label="Close">×</button>
      </div>

      <label>
        Task title
        <input name="title" placeholder="Physics Electrostatics — 40 PYQs" required />
      </label>

      <div class="form-grid two">
        <label>
          Subject
          <select name="subject">
            <option>Physics</option>
            <option>Chemistry</option>
            <option>Mathematics</option>
            <option>Mock Test</option>
            <option>Revision</option>
            <option>Health</option>
            <option>Personal</option>
            <option>General</option>
          </select>
        </label>
        <label>
          Category
          <select name="category">
            <option>Study</option>
            <option>Practice</option>
            <option>Revision</option>
            <option>Mock</option>
            <option>Habit</option>
            <option>Health</option>
            <option>Personal</option>
            <option>Custom</option>
            <option>Review</option>
          </select>
        </label>
      </div>

      <div class="form-grid three">
        <label>
          Priority
          <select name="priority">
            <option value="critical">Critical</option>
            <option value="high" selected>High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </label>
        <label>
          Difficulty
          <select name="difficulty">
            <option>Easy</option>
            <option selected>Medium</option>
            <option>Hard</option>
            <option>Extreme</option>
          </select>
        </label>
        <label>
          Est. minutes
          <input name="estimate" type="number" min="5" step="5" value="60" required />
        </label>
      </div>

      <label>
        Notes
        <textarea name="notes" placeholder="Optional focus note"></textarea>
      </label>

      <div class="modal-actions">
        <button class="ghost-button" type="button" data-action="close-task-dialog">Cancel</button>
        <button class="primary-button" type="submit">Add to Today</button>
      </div>
    </form>
  </dialog>

  <dialog class="modal" id="goalDialog">
    <form method="dialog" class="modal-card" id="goalDialogForm">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Main Mission</p>
          <h2>Edit Goal</h2>
        </div>
        <button class="icon-button" type="button" data-action="close-goal-dialog" aria-label="Close">×</button>
      </div>

      <label>
        Goal name
        <input name="name" required />
      </label>

      <div class="form-grid two">
        <label>
          Target result
          <input name="target" required />
        </label>
        <label>
          Deadline date
          <input name="deadlineDate" type="date" required />
        </label>
      </div>

      <div class="form-grid two">
        <label>
          Deadline time IST
          <input name="deadlineTime" type="time" required />
        </label>
        <label>
          Daily study target hours
          <input name="dailyHours" type="number" min="1" max="18" step="0.5" required />
        </label>
      </div>

      <div class="form-grid two">
        <label>
          Current phase
          <input name="phase" />
        </label>
        <label>
          Current weak area
          <input name="weakArea" />
        </label>
      </div>

      <div class="modal-actions">
        <button class="ghost-button" type="button" data-action="close-goal-dialog">Cancel</button>
        <button class="primary-button" type="submit">Save Goal</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./app.js"></script>
</body>
</html>
